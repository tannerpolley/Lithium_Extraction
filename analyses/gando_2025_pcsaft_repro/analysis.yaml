id: gando_2025_pcsaft_repro
title: Gando 2025 PC-SAFT Reproduction
status: active
summary: Reproduce and diagnose Gando 2025 PC-SAFT extraction behavior and provide the selective-stage helper used by other analyses.
owner: project
epcsaft_dependency:
  required: true
  package_source: C:\Users\Tanner\Documents\git\ePC-SAFT
inputs:
  - path: data/pcsaft_parameters/gando_2025/
    kind: parameter_inputs
outputs:
  - path: data/multiphase/gando_2025_pcsaft_repro.csv
    kind: generated_reproduction_table
commands:
  validate:
    - uv run python analyses/gando_2025_pcsaft_repro/scripts/reproduce_gando_2025_pcsaft.py
runtime:
  quick_seconds: 120
  full_seconds: 240
