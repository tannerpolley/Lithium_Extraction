id: rezaee_2026_pcsaft_epcsaft
title: Rezaee 2026 PC-SAFT/ePC-SAFT Package Smoke
status: active
summary: First-class package-validation case study for Rezaee 2026 DES/TOPO parameter regression and electrolyte phase/speciation plumbing.
owner: project
boundary:
  objective: Validate package regression behavior and coupled chemical/phase-equilibrium plumbing for Li extraction from Na after divalent pretreatment.
  not_objectives:
    - Full HBTA/TOPO closure.
    - Divalent extraction or divalent equilibrium modeling.
    - Full extraction-percent reproduction from the paper.
    - Treating calibrated distribution-surrogate rows as direct reactive-LLE closure.
epcsaft_dependency:
  required: true
  package_source: C:\Users\Tanner\Documents\git\ePC-SAFT
  notes:
    - Uses Rezaee's paper-reported DES/TOPO/RLi/RNa PC-SAFT-style parameters as source truth.
    - Uses a nonassociating DES density refit as a package regression smoke, not as a replacement for the paper parameterization.
    - Exercises ePC-SAFT electrolyte stability and LLE API plumbing for a pseudo-DES aqueous/organic split.
inputs:
  - path: analyses/rezaee_2026_pcsaft_epcsaft/data/input/rezaee_2026_reaction_constants.csv
    kind: source_transcription
