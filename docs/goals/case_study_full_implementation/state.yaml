version: 2

goal:
  title: "Case Study Full Implementation"
  slug: "case_study_full_implementation"
  kind: existing_plan
  tranche: "Implement the master success-only Lithium_Extraction case-study specification end to end."
  status: done
  intake:
    original_request: "Prep plan first with GoalBuddy, then fully implement the attached master Lithium case-study spec with no diagnostic failures, no fake results, and periodic ePC-SAFT main checks."
    interpreted_outcome: "Prepare a GoalBuddy board so the later /goal run implements the master success-only produced-water lithium extraction case study through environment, source data, stage response, ALAMO, real PrOMMiS/IDAES, notebook, TEA, rendered deck, and final all-pass success report."
    input_shape: existing_plan
    audience: "Internal KeyLogic/government-contracted technical management and project leads"
    authority: requested
    proof_type: artifact
    completion_proof: "All master-spec success gates pass; final artifacts include executed notebook, ALAMO JSON, real PrOMMiS/IDAES stage results, screening TEA outputs, rendered deck, and results/tbac_da_topo_success_gate_report.md with only passing gates."
    likely_misfire: "Treating prior diagnostic case-study outputs, algebraic prechecks, or failed direct ePC-SAFT diagnostics as accepted final deliverables."
    hard_constraints:
      - "Final deliverables must be success artifacts only."
      - "No diagnostic failure outputs may be submitted as completion evidence."
      - "No fake final results."
      - "The only permitted synthetic/non-factual data is source-anchored generated demonstration stage-response data for ALAMO/PrOMMiS/TEA propagation when accepted direct ePC-SAFT output is not available."
      - "Synthetic demonstration data must be labeled with backend_name=synthetic_source_anchored_demo, model_basis=source_paper_anchored_synthetic_stage_response, synthetic_demo_data=true, and direct_epcsaft_closure=false."
      - "Use real PrOMMiS imports and unit models for anything called PrOMMiS/IDAES output."
      - "Do not copy PrOMMiS source into Lithium_Extraction."
      - "Preserve the original PrOMMiS notebook and revise only the Lithium_Extraction copy."
      - "Do not include Trust Region Framework content."
      - "Periodically check ePC-SAFT origin/main for new commits or a merged PR that enables accepted direct closure."
    blind_spots_considered:
      - "The repo already contains Agent 1/2/3 artifacts that may be useful evidence but do not automatically satisfy this stricter master spec."
      - "PrOMMiS, IDAES, Pyomo, ALAMO, notebook execution, and Quarto/PPT/PDF rendering may fail independently and must be gated separately."
      - "A direct ePC-SAFT path may become viable if upstream main advances; the board must poll before each major implementation phase."
      - "If direct ePC-SAFT remains unavailable, only the narrow source-anchored stage-response fallback is allowed."
      - "Final docs/deck/notebook-facing text must avoid forbidden diagnostic language while still preserving honest technical boundaries."
      - "Incomplete feed rows may be comparison-only unless source-filled or explicitly isolated as synthetic demonstration data."
      - "Algebraic prechecks are not PrOMMiS output."
      - "The final success report cannot contain failed gates."
    existing_plan_facts:
      - "Controlling spec: docs/plans/MASTER_LITHIUM_CASE_STUDY_SUCCESS_ONLY_AGENT_SPEC.md."
      - "Active chemistry: TBAC(1):DA(2) hydrophobic DES + 10 wt% TOPO."
      - "Active extraction species: Li and Na."
      - "Pretreatment/context species include Ca, Mg, Sr, Ba, K, organics, oil, suspended solids, and H2S if relevant."
      - "Main ALAMO inputs must be li_mg_L, na_mg_L, o_to_a_ratio, topo_wt_pct."
      - "Primary ALAMO outputs must be logit_k_Li and logit_k_Na."
      - "Two design domains are required: source-paper-valid and produced-water-centered."
      - "PrOMMiS must be installed as a pinned Git dependency; do not copy its source tree."
      - "Required local namespace is src/lithium_extraction/prommis_case_study/."
      - "Copied notebook path is docs/tutorials/tbac_da_topo_produced_water_case_study.ipynb."
      - "Required success report path is results/tbac_da_topo_success_gate_report.md."
      - "Required tests include stage response, ALAMO contract, PrOMMiS MSContactor, TEA schema, and forbidden diagnostic scans."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  success_only_final_artifacts: true
  no_fake_final_results: true
  periodic_epcsaft_main_polling_required: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

