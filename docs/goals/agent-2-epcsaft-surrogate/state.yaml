version: 2

goal:
  title: "Agent 2 ePC-SAFT Surrogate"
  slug: "agent-2-epcsaft-surrogate"
  kind: existing_plan
  tranche: "Prepare the Agent 2 board; later execute ePC-SAFT diagnostics, phase-inventory scans, and transfer-variable artifacts from the prompt."
  status: done
  intake:
    original_request: "Prep the goal to follow docs/plans/AGENT_2_EPCSAFT_SURROGATE_PROMPT.md and read docs/plans/MASTER_CASE_STUDY_CONTEXT_ROADMAP.md for context."
    interpreted_outcome: "Create a GoalBuddy board that will execute the Agent 2 ePC-SAFT surrogate and transfer-variable slice with correct case-study language and validation boundaries."
    input_shape: existing_plan
    audience: "Internal KeyLogic/government-contracted technical management and project leads"
    authority: requested
    proof_type: artifact
    completion_proof: "Agent 2 prompt deliverables exist, validation passes or blockers are documented, and transfer-variable outputs are ready for Agent 3."
    likely_misfire: "Starting model/surrogate work without first reading the Agent 2 prompt and master roadmap or without preserving Agent 1 naming/feed boundaries."
    blind_spots_considered:
      - "Direct reactive-LLE closure may remain unresolved and must not be overclaimed."
      - "High-Na/Li produced-water rows are extrapolations beyond the source-paper low-Na/Li design space."
      - "Phase-inventory / reaction-coordinate reference-state convention may be the main unresolved diagnostic."
      - "Transfer-table and costing-stage recoveries may differ and must not be blended without labels."
      - "Mutable local ePC-SAFT worktree use is not allowed for stable/final downstream mode."
    existing_plan_facts:
      - "Controlling prompt: docs/plans/AGENT_2_EPCSAFT_SURROGATE_PROMPT.md."
      - "Context roadmap: docs/plans/MASTER_CASE_STUDY_CONTEXT_ROADMAP.md."
      - "Agent 1 outputs define the case-study framing, selected feeds, and TBAC/DA/TOPO LHS/LHC ranges."
      - "Agent 2 owns ePC-SAFT, phase-inventory diagnostics, and Li/Na transfer variables."
      - "Agent 3 owns PrOMMiS/IDAES staged extraction, screening TEA, and deck revision."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/agent-2-epcsaft-surrogate/"
    command: "& C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/agent-2-epcsaft-surrogate"
  github_projects:
