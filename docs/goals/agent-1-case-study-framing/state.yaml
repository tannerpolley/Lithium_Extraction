version: 2

goal:
  title: "Agent 1 Case-Study Framing"
  slug: "agent-1-case-study-framing"
  kind: existing_plan
  tranche: "Complete the Agent 1 framing artifacts and verify the prompt acceptance checks."
  status: done
  intake:
    original_request: "/goal Follow the prompt in the agent 1 case md document and read the master case study plan for context."
    interpreted_outcome: "Create or update the Agent 1 case-study framing deliverables with correct TBAC/DA/TOPO language, feed choices, claim boundaries, and storyboard structure."
    input_shape: existing_plan
    audience: "Internal KeyLogic/government-contracted technical management and project leads"
    authority: requested
    proof_type: artifact
    completion_proof: "Required deliverables exist, satisfy prompt acceptance checks, and validation commands pass."
    likely_misfire: "Producing an ePC-SAFT-theory-first or author-name-solvent framing instead of a case-study-first internal project package."
    blind_spots_considered:
      - "Stale HBTA/TOPO or author-name solvent labels."
      - "Mixing Smackover and Marcellus feed decisions."
      - "Treating divalent ions as active extraction species instead of pretreatment or leakage guardrails."
      - "Overclaiming predictive direct reactive-LLE closure or investment-grade TEA."
      - "Varying TOPO in the main design despite the fixed 10 wt% requirement."
    existing_plan_facts:
      - "Controlling prompt: docs/plans/AGENT_1_CASE_STUDY_FRAMING_PROMPT.md."
      - "Context roadmap: docs/plans/MASTER_CASE_STUDY_CONTEXT_ROADMAP.md."
      - "Deliverables: docs/case_study_tbac_da_topo_storyboard.md; docs/case_study_claims_and_boundaries.md; data/reference/produced_water/selected_case_study_feeds.csv; data/reference/produced_water/tbac_da_topo_lhs_input_ranges.csv; changelog."
      - "Do not implement ePC-SAFT model, PrOMMiS flowsheet, or TEA in this slice."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/agent-1-case-study-framing/"
    command: "& C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/agent-1-case-study-framing"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: high
    objective: "Implement the Agent 1 framing artifact slice exactly within the prompt scope."
    inputs:
      - "docs/plans/AGENT_1_CASE_STUDY_FRAMING_PROMPT.md"
      - "docs/plans/MASTER_CASE_STUDY_CONTEXT_ROADMAP.md"
      - "data/reference/produced_water/"
      - "docs/case_study_charter.md"
    constraints:
      - "Use chemical solvent labels, not source-author solvent shorthand."
      - "Keep Smackover MS-2 as the main flowsheet case."
      - "Keep Marcellus NE PA as a lower-burden comparison with missing chemistry flags if unresolved."
      - "Keep Bakken as a model stress case only."
      - "Do not make Permian the main case."
      - "Do not edit model, PrOMMiS, TEA, or PowerPoint implementation files."
    expected_output:
      - "Required deliverable files created or updated."
      - "Prompt acceptance checks pass."
      - "Short changelog lists files touched."
    receipt:
      result: done
      status: done
      summary: "Created the Agent 1 case-study framing artifacts with chemical TBAC/DA/TOPO solvent labels, selected feed roles, fixed-formulation LHS/LHC ranges, claim boundaries, and old-deck treatment."
      files_changed:
        - "docs/case_study_tbac_da_topo_storyboard.md"
        - "docs/case_study_claims_and_boundaries.md"
        - "data/reference/produced_water/selected_case_study_feeds.csv"
        - "data/reference/produced_water/tbac_da_topo_lhs_input_ranges.csv"
        - "docs/case_study_tbac_da_topo_changelog.md"
        - "docs/goals/agent-1-case-study-framing/goal.md"
        - "docs/goals/agent-1-case-study-framing/state.yaml"
      validation:
        - "required files present"
        - "CSV files parse and contain required rows"
        - "no author shorthand or TOPO range drift found in new executive-facing artifacts"
        - "storyboard has 12 slide rows"
        - "uv run python -m compileall -q scripts data"
  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the completed Agent 1 deliverables satisfy the prompt and roadmap."
    inputs:
      - "T001 receipt"
      - "Current diff"
      - "Validation output"
    constraints:
      - "Reject completion if author-name solvent labels appear in new executive-facing titles or artifact names."
      - "Reject completion if TOPO varies in the main LHS/LHC design."
      - "Reject completion if Smackover and Marcellus are blended."
      - "Reject completion if the storyboard is ePC-SAFT-theory-first."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      status: done
      decision: complete
      full_outcome_complete: true
      summary: "Agent 1 deliverables satisfy the prompt acceptance checks for naming, feed separation, pretreatment boundary, internal screening-TEA framing, fixed 10 wt% TOPO formulation, and case-study-first storyboard order."
      missing_evidence: []
      next_task: null

checks:
  dirty_fingerprint: "Agent 1 deliverables and GoalBuddy board files changed."
  last_verification:
    result: pass
    task: T999
    commands:
      - "node <goalbuddy-checker> docs/goals/agent-1-case-study-framing/state.yaml"
      - "PowerShell required-file presence check"
      - "PowerShell selected_case_study_feeds.csv and tbac_da_topo_lhs_input_ranges.csv checks"
      - "PowerShell no author shorthand or TOPO range drift check"
      - "PowerShell storyboard row-count check"
      - "uv run python -m compileall -q scripts data"
