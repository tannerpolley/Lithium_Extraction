version: 2

goal:
  title: "Agent 3 PrOMMiS/IDAES TEA Deck"
  slug: "agent-3-prommis-tea-deck"
  kind: existing_plan
  tranche: "Execute the Agent 3 process, screening-TEA, and management-facing deck slice from the prompt."
  status: done
  intake:
    original_request: "Prep the goal to follow docs/plans/AGENT_3_PROMMIS_TEA_DECK_PROMPT.md and read docs/plans/MASTER_CASE_STUDY_CONTEXT_ROADMAP.md for context."
    interpreted_outcome: "Create a GoalBuddy board that will convert Agent 1 and Agent 2 case-study outputs into PrOMMiS/IDAES-style staged extraction, screening-TEA, deck, figure, readiness, and changelog artifacts."
    input_shape: existing_plan
    audience: "Internal KeyLogic/government-contracted technical management and project leads"
    authority: requested
    proof_type: artifact
    completion_proof: "Agent 3 process, screening-TEA, deck, figure, readiness-checklist, and changelog deliverables exist; validation and renders pass or blockers are documented; final audit confirms internal-escalation readiness."
    likely_misfire: "Producing an ePC-SAFT theory lecture or generic cost deck instead of a case-study-first internal project escalation package with reconciled transfer/process/TEA numbers."
    blind_spots_considered:
      - "Transfer-table staged recovery and PrOMMiS/IDAES costing recovery may differ and must be reconciled before deck use."
      - "Marcellus NE PA has missing Na/Ca/Sr/Ba chemistry and may be comparison-card-only unless filled from source-backed data."
      - "High Na/Li produced-water rows are extrapolations beyond source-paper low-Na/Li design space."
      - "Direct reactive-LLE closure remains unpromoted unless direct validation passes."
      - "Divalent ions belong in pretreatment/cost/loss/guardrail logic, not active Li/Na extraction species."
      - "Screening TEA cost numbers must not read as vendor-grade, design-grade, investment-grade, or commercialization claims."
      - "PowerPoint is out of scope unless explicitly reopened; text-first deck source is required."
    existing_plan_facts:
      - "Controlling prompt: docs/plans/AGENT_3_PROMMIS_TEA_DECK_PROMPT.md."
      - "Context roadmap: docs/plans/MASTER_CASE_STUDY_CONTEXT_ROADMAP.md."
      - "Agent 1 outputs define case framing, claims/boundaries, selected feeds, and LHS/LHC ranges."
      - "Agent 2 outputs define transfer variables, phase-inventory diagnostic boundaries, and surrogate model-basis labels."
      - "Main case: Smackover MS-2; comparison: Marcellus NE PA; stress: Bakken; high-Li sensitivity: Smackover high observed."
      - "Final deck target: 10-12 main slides plus backup, case-study-first, internal project ask first."
      - "Required deliverables include tbac_da_topo_prommis_stage_results, screening_tea outputs, case-study deck package, figures, final readiness checklist, and changelog."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

